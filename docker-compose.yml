services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: test3205-backend:latest
    container_name: test3205-backend
    environment:
      NODE_ENV: production
      PORT: "3000"
      MAX_CONCURRENCY: "5"        # max concurrent HEAD requests per job
      DELAY_MAX_MS: "10000"       # upper bound of the artificial random delay
      HEAD_TIMEOUT_MS: "10000"    # per-request HEAD timeout
      CORS_ORIGIN: "*"            # open CORS so any frontend origin can call the API
      LOG_LEVEL: "info"
    ports:
      - "3000:3000"              # API + Swagger UI at http://localhost:3000/api/docs
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
